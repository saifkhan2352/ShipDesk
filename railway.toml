[build]
builder = "nixpacks"
buildCommand = "npm install && npm run db:generate --workspace=server && npm run build --workspace=server"

[deploy]
startCommand = "npx prisma migrate deploy --schema=server/prisma/schema.prisma && node server/dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
