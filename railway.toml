[build]
builder = "nixpacks"
buildCommand = "npm run db:generate --workspace=server && npm run build --workspace=server"

[deploy]
startCommand = "cd server && npx prisma db push --skip-generate && node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
